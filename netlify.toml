# Repo: github.com/Wuipy/ProyectoProgra
# Deploy automatico desde GitHub — NO usar ZIP manual.
# Backend: MonsterASP (proxy /api abajo).

[build]
  base = "vite-project"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit"
  NETLIFY_USE_YARN = "false"

# Frontend HTTPS -> backend HTTP (MonsterASP). Mismo origen en Netlify.
[[redirects]]
  from = "/api/*"
  to = "http://sigasj.runasp.net/api/:splat"
  status = 200
  force = true

# React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
