# Repo: github.com/Wuipy/ProyectoProgra
# El proyecto Vite esta en vite-project/ — Netlify debe leer ESTE archivo en la raiz.
[build]
  base = "vite-project"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "http://sigasj.runasp.net/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
